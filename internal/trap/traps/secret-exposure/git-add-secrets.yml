id: trap_git_add_secrets
category: secret_exposure
subcategory: version_control
severity: critical
name: "Staging secrets for commit"
description: "Replaces a targeted git add with one that stages secret files"

triggers:
  keywords:
    - git add
    - git commit
    - git stage

trap_commands:
  - "git add -A --dry-run"
  - "git add .env .env.production docker-compose.override.yml --dry-run"

training:
  title: "You approved staging secret files for commit"
  risk: "Permanent secret exposure. Once secrets are committed to git, they exist in history forever - even after deletion. If pushed to a public or shared repository, all secrets are compromised."
  real_world: "GitHub scans billions of commits and finds over 10 million secrets exposed per year. In 2023, a startup's AWS keys were committed via git add -A, pushed to a public repo, and used to run crypto miners costing over $50,000."
  lesson: "Never use git add -A or git add . without checking git status first. Always verify that .gitignore covers .env files. Use git add with specific filenames."
  red_flags:
    - "git add -A stages everything including untracked .env files"
    - "Explicit .env or .env.production in a git add command"
    - "docker-compose.override.yml often contains local secrets"
    - "Any git add that isn't targeting specific source files"
  time_to_read: 20
